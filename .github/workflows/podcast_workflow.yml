name: 🎙️ Generate Podcast Video (9:16)

on:
  workflow_dispatch:
    inputs:
      script_text:
        description: 'ข้อความ Script สำหรับ Podcast'
        required: true
      video_title:
        description: 'ชื่อเรื่อง Podcast (แสดงบนวิดีโอ)'
        required: true
        default: 'Podcast EP.1'
      output_filename:
        description: 'ชื่อไฟล์ output (ไม่ต้องใส่นามสกุล)'
        required: false
        default: 'podcast_video'
      voice_name:
        description: 'เสียงจาก Gemini TTS'
        required: false
        default: 'Puck'
        type: choice
        options:
          - Puck
          - Charon
          - Kore
          - Fenrir
          - Aoede

jobs:
  build-video:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. INSTALL DEPENDENCIES
      # ─────────────────────────────────────────
      - name: 🔧 Install FFmpeg & Python libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-thai-tlwg
          pip install requests --quiet

      # ─────────────────────────────────────────
      # 3. GENERATE AUDIO — Gemini TTS API
      # ─────────────────────────────────────────
      - name: 🔊 Generate Audio from Gemini TTS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRIPT_TEXT: ${{ github.event.inputs.script_text }}
          VOICE_NAME: ${{ github.event.inputs.voice_name }}
        run: |
          python3 << 'EOF'
          import os, requests, base64, struct, json

          api_key   = os.environ["GEMINI_API_KEY"]
          text      = os.environ["SCRIPT_TEXT"]
          voice     = os.environ.get("VOICE_NAME", "Puck")
          url       = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key={api_key}"

          payload = {
            "contents": [{"role": "user", "parts": [{"text": text}]}],
            "generationConfig": {
              "responseModalities": ["AUDIO"],
              "speechConfig": {
                "voiceConfig": {
                  "prebuiltVoiceConfig": {"voiceName": voice}
                }
              }
            }
          }

          print(f"🎙️ Calling Gemini TTS (voice={voice})...")
          r = requests.post(url, json=payload, timeout=120)
          r.raise_for_status()
          data = r.json()

          inline = data["candidates"][0]["content"]["parts"][0]["inlineData"]
          pcm_bytes = base64.b64decode(inline["data"])
          print(f"✅ Got PCM audio: {len(pcm_bytes)} bytes")

          # Convert PCM → WAV (24000Hz, mono, 16-bit)
          sample_rate, num_ch, bit_depth = 24000, 1, 16
          byte_rate = sample_rate * num_ch * bit_depth // 8
          block_align = num_ch * bit_depth // 8
          data_len = len(pcm_bytes)

          with open("audio.wav", "wb") as f:
            f.write(b"RIFF")
            f.write(struct.pack("<I", 36 + data_len))
            f.write(b"WAVEfmt ")
            f.write(struct.pack("<IHHIIHH", 16, 1, num_ch, sample_rate, byte_rate, block_align, bit_depth))
            f.write(b"data")
            f.write(struct.pack("<I", data_len))
            f.write(pcm_bytes)

          print("✅ Saved audio.wav")
          EOF

      # ─────────────────────────────────────────
      # 4. GET AUDIO DURATION
      # ─────────────────────────────────────────
      - name: ⏱️ Get Audio Duration
        run: |
          DURATION=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 audio.wav)
          echo "AUDIO_DURATION=$DURATION" >> $GITHUB_ENV
          echo "Audio duration: ${DURATION}s"

      # ─────────────────────────────────────────
      # 5. CREATE BACKGROUND IMAGE WITH TITLE
      #    9:16 = 1080x1920
      #    - ใช้ cover.jpg (ถ้ามี) หรือสร้าง gradient สีเอง
      #    - วาดชื่อเรื่องด้านบน
      # ─────────────────────────────────────────
      - name: 🎨 Create Background Image with Title
        env:
          VIDEO_TITLE: ${{ github.event.inputs.video_title }}
        run: |
          python3 << 'EOF'
          import subprocess, os, shutil

          title = os.environ["VIDEO_TITLE"]
          W, H  = 1080, 1920

          # ── ถ้ามี cover.jpg ใน repo ใช้เลย ──────────────────
          if os.path.exists("cover.jpg"):
            # resize ให้ได้ 9:16 พอดี
            subprocess.run([
              "ffmpeg", "-y", "-i", "cover.jpg",
              "-vf", f"scale={W}:{H}:force_original_aspect_ratio=increase,"
                     f"crop={W}:{H}",
              "bg_resized.jpg"
            ], check=True)
            bg_file = "bg_resized.jpg"
          else:
            # ── สร้าง gradient สีม่วง-น้ำเงิน (ไม่มีรูป) ──────
            subprocess.run([
              "ffmpeg", "-y",
              "-f", "lavfi",
              "-i", f"color=0x1a0533:size={W}x{H}:rate=1",
              "-vframes", "1", "bg_plain.jpg"
            ], check=True)
            bg_file = "bg_plain.jpg"

          # ── วาง title ด้วย ffmpeg drawtext ──────────────────
          font_path = "/usr/share/fonts/truetype/tlwg/TlwgTypo.ttf"
          if not os.path.exists(font_path):
            font_path = "/usr/share/fonts/truetype/tlwg/Loma.ttf"

          # แบ่ง title ถ้ายาวเกิน (ตัดตาม 20 ตัวอักษร)
          words = title
          filter_text = (
            f"drawtext=text='{words}':"
            f"fontfile='{font_path}':"
            f"fontcolor=white:"
            f"fontsize=72:"
            f"borderw=3:bordercolor=black:"
            f"x=(w-text_w)/2:"
            f"y=120:"
            f"line_spacing=20"
          )

          subprocess.run([
            "ffmpeg", "-y", "-i", bg_file,
            "-vf", filter_text,
            "background_final.jpg"
          ], check=True)
          print("✅ Background image created: background_final.jpg")
          EOF

      # ─────────────────────────────────────────
      # 6. PREPARE CARTOON CLIP (วนลูป)
      #    cartoon.mp4 / cartoon.gif ต้องอยู่ใน repo
      #    ถ้าไม่มี → ใช้ placeholder สีเขียว
      # ─────────────────────────────────────────
      - name: 🎭 Prepare Looping Cartoon Clip
        run: |
          DURATION=${{ env.AUDIO_DURATION }}

          # หา source ไฟล์การ์ตูน
          if [ -f "cartoon.mp4" ]; then
            SRC="cartoon.mp4"
          elif [ -f "cartoon.gif" ]; then
            # แปลง GIF → MP4 ก่อน
            ffmpeg -y -i cartoon.gif -movflags faststart \
              -pix_fmt yuv420p -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
              cartoon_converted.mp4
            SRC="cartoon_converted.mp4"
          else
            # สร้าง placeholder (วงกลมสีเขียว 3 วิ)
            ffmpeg -y -f lavfi \
              -i "color=0x00aa44:size=300x300:rate=25" \
              -vf "drawtext=text='🎙️':fontsize=120:x=(w-text_w)/2:y=(h-text_h)/2" \
              -t 3 cartoon_placeholder.mp4
            SRC="cartoon_placeholder.mp4"
          fi

          echo "Using cartoon source: $SRC"

          # วนลูปจนครบ duration ของเสียง (เพิ่ม 2 วิ buffer)
          LOOP_DUR=$(python3 -c "print(float('${DURATION}') + 2)")

          ffmpeg -y \
            -stream_loop -1 -i "$SRC" \
            -t "$LOOP_DUR" \
            -vf "scale=320:320:force_original_aspect_ratio=decrease,\
                 pad=320:320:(ow-iw)/2:(oh-ih)/2:color=black@0" \
            -c:v libx264 -pix_fmt yuv420p \
            cartoon_loop.mp4

          echo "✅ cartoon_loop.mp4 ready (${LOOP_DUR}s)"

      # ─────────────────────────────────────────
      # 7. COMPOSITE: BG + AUDIO + CARTOON → FINAL 9:16
      #    Layout:
      #    - พื้นหลัง 1080x1920 (cover + title)
      #    - การ์ตูน 320x320 มุมขวาล่าง (offset 30px)
      # ─────────────────────────────────────────
      - name: 🎬 Composite Final Video (9:16)
        env:
          OUTPUT_FILENAME: ${{ github.event.inputs.output_filename }}
        run: |
          DURATION=${{ env.AUDIO_DURATION }}

          # ตำแหน่งการ์ตูน: มุมขวาล่าง ห่างขอบ 30px
          # x = 1080 - 320 - 30 = 730
          # y = 1920 - 320 - 30 = 1570

          ffmpeg -y \
            -loop 1 -framerate 25 -i background_final.jpg \
            -i cartoon_loop.mp4 \
            -i audio.wav \
            -filter_complex "
              [0:v]scale=1080:1920,setsar=1[bg];
              [1:v]scale=320:320[cartoon];
              [bg][cartoon]overlay=730:1570:shortest=0[out]
            " \
            -map "[out]" \
            -map "2:a" \
            -c:v libx264 -preset fast -crf 22 \
            -c:a aac -b:a 192k \
            -pix_fmt yuv420p \
            -t "$DURATION" \
            -movflags +faststart \
            "${OUTPUT_FILENAME}.mp4"

          echo "✅ Final video: ${OUTPUT_FILENAME}.mp4"
          ls -lh "${OUTPUT_FILENAME}.mp4"

      # ─────────────────────────────────────────
      # 8. UPLOAD ARTIFACT
      # ─────────────────────────────────────────
      - name: 📤 Upload Podcast Video
        uses: actions/upload-artifact@v4
        with:
          name: Podcast-Video-${{ github.event.inputs.output_filename }}
          path: "${{ github.event.inputs.output_filename }}.mp4"
          retention-days: 7
