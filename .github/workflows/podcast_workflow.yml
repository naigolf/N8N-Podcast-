name: 🎙️ Generate Podcast Video (9:16)

on:
  workflow_dispatch:
    inputs:
      script_text:
        description: 'ข้อความ Script สำหรับ Podcast'
        required: true
      video_title:
        description: 'ชื่อเรื่อง Podcast (แสดงบนวิดีโอ)'
        required: true
        default: 'Podcast EP.1'
      output_filename:
        description: 'ชื่อไฟล์ output (ไม่ต้องใส่นามสกุล)'
        required: false
        default: 'podcast_video'
      voice_name:
        description: 'เสียงจาก Gemini TTS'
        required: false
        default: 'Puck'
        type: choice
        options:
          - Puck
          - Charon
          - Kore
          - Fenrir
          - Aoede

jobs:
  build-video:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Install FFmpeg & Python libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-thai-tlwg
          pip install requests --quiet

      # ─────────────────────────────────────────
      # 3. GENERATE AUDIO — Gemini TTS API
      # ─────────────────────────────────────────
      - name: 🔊 Generate Audio from Gemini TTS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRIPT_TEXT: ${{ github.event.inputs.script_text }}
          VOICE_NAME: ${{ github.event.inputs.voice_name }}
        run: |
          python3 << 'EOF'
          import os, requests, base64, struct

          api_key = os.environ["GEMINI_API_KEY"]
          text    = os.environ["SCRIPT_TEXT"]
          voice   = os.environ.get("VOICE_NAME", "Puck")
          url     = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key={api_key}"

          payload = {
            "contents": [{"role": "user", "parts": [{"text": text}]}],
            "generationConfig": {
              "responseModalities": ["AUDIO"],
              "speechConfig": {
                "voiceConfig": {
                  "prebuiltVoiceConfig": {"voiceName": voice}
                }
              }
            }
          }

          print(f"🎙️ Calling Gemini TTS (voice={voice})...")
          r = requests.post(url, json=payload, timeout=120)
          r.raise_for_status()
          data = r.json()

          inline    = data["candidates"][0]["content"]["parts"][0]["inlineData"]
          pcm_bytes = base64.b64decode(inline["data"])
          print(f"✅ Got PCM audio: {len(pcm_bytes)} bytes")

          sample_rate, num_ch, bit_depth = 24000, 1, 16
          byte_rate   = sample_rate * num_ch * bit_depth // 8
          block_align = num_ch * bit_depth // 8
          data_len    = len(pcm_bytes)

          with open("audio.wav", "wb") as f:
            f.write(b"RIFF")
            f.write(struct.pack("<I", 36 + data_len))
            f.write(b"WAVEfmt ")
            f.write(struct.pack("<IHHIIHH", 16, 1, num_ch, sample_rate, byte_rate, block_align, bit_depth))
            f.write(b"data")
            f.write(struct.pack("<I", data_len))
            f.write(pcm_bytes)

          print("✅ Saved audio.wav")
          EOF

      # ─────────────────────────────────────────
      # 4. GET AUDIO DURATION
      # ─────────────────────────────────────────
      - name: ⏱️ Get Audio Duration
        run: |
          DURATION=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 audio.wav)
          echo "AUDIO_DURATION=$DURATION" >> $GITHUB_ENV
          echo "Audio duration: ${DURATION}s"

      # ─────────────────────────────────────────
      # 5. PREPARE BACKGROUND IMAGE (ไม่มีข้อความ)
      # ─────────────────────────────────────────
      - name: 🎨 Prepare Background Image
        run: |
          W=1080
          H=1920

          if [ -f "cover.jpg" ]; then
            # Resize cover.jpg ให้ได้ 9:16 พอดี ไม่มีข้อความ
            ffmpeg -y -i cover.jpg \
              -vf "scale=${W}:${H}:force_original_aspect_ratio=increase,crop=${W}:${H}" \
              background_final.jpg
            echo "✅ Using cover.jpg as background"
          else
            # สร้างพื้นหลังสีม่วงเข้ม
            ffmpeg -y -f lavfi \
              -i "color=0x1a0533:size=${W}x${H}:rate=25" \
              -vframes 1 background_final.jpg
            echo "✅ Created gradient background"
          fi



      # ─────────────────────────────────────────
      # 6. PREPARE CARTOON CLIP (วนลูป + พื้นหลังโปร่งใส)
      # ─────────────────────────────────────────
      - name: 🎭 Prepare Looping Cartoon Clip
        run: |
          DURATION=${{ env.AUDIO_DURATION }}
          LOOP_DUR=$(python3 -c "print(float('${DURATION}') + 2)")

          if [ -f "cartoon.gif" ]; then
            # แปลง GIF → APNG เพื่อรักษา transparency
            ffmpeg -y -i cartoon.gif \
              -plays 0 \
              cartoon_alpha.apng
            SRC="cartoon_alpha.apng"
            echo "✅ Using cartoon.gif with transparency"
          elif [ -f "cartoon.mp4" ]; then
            SRC="cartoon.mp4"
          else
            ffmpeg -y -f lavfi \
              -i "color=0x00aa44:size=300x300:rate=25" \
              -t 3 cartoon_placeholder.mp4
            SRC="cartoon_placeholder.mp4"
          fi

          echo "Using cartoon source: $SRC"

          # วนลูปจนครบ duration — คงสัดส่วนเดิม ขยายเต็ม 1080px
          ffmpeg -y \
            -stream_loop -1 -i "$SRC" \
            -t "$LOOP_DUR" \
            -vf "scale=1080:-1:flags=lanczos" \
            -c:v libvpx-vp9 \
            -pix_fmt yuva420p \
            -auto-alt-ref 0 \
            cartoon_loop.webm

          echo "✅ cartoon_loop.webm ready (${LOOP_DUR}s)"

      # ─────────────────────────────────────────
      # 7. COMPOSITE FINAL VIDEO
      #    การ์ตูน: เต็มความกว้าง 1080px
      #    ห่างขอบล่าง 200px
      #    y = 1920 - cartoon_height - 200
      #    cartoon_height = 1080 * (original_h/original_w)
      #    GIF ขนาด 371x161 → scale to 1080 → height = 469
      #    y = 1920 - 469 - 200 = 1251
      # ─────────────────────────────────────────
      - name: 🎬 Composite Final Video (9:16)
        env:
          OUTPUT_FILENAME: ${{ github.event.inputs.output_filename }}
        run: |
          DURATION=${{ env.AUDIO_DURATION }}

          # คำนวณ height ของ cartoon หลัง scale เต็ม 1080px
          ORIG_W=$(ffprobe -v quiet -select_streams v:0 \
            -show_entries stream=width -of csv=p=0 cartoon_loop.webm)
          ORIG_H=$(ffprobe -v quiet -select_streams v:0 \
            -show_entries stream=height -of csv=p=0 cartoon_loop.webm)
          CARTOON_Y=$(python3 -c "print(1920 - ${ORIG_H} - 200)")
          echo "Cartoon size: ${ORIG_W}x${ORIG_H}, y=${CARTOON_Y}"

          ffmpeg -y \
            -loop 1 -framerate 25 -i background_final.jpg \
            -i cartoon_loop.webm \
            -i audio.wav \
            -filter_complex "
              [0:v]scale=1080:1920,setsar=1,fps=25[bg];
              [1:v]scale=1080:-1[cartoon];
              [bg][cartoon]overlay=0:${CARTOON_Y}:shortest=0[out]
            " \
            -map "[out]" \
            -map "2:a" \
            -c:v libx264 -preset fast -crf 22 \
            -c:a aac -b:a 192k \
            -pix_fmt yuv420p \
            -r 25 \
            -t "$DURATION" \
            -movflags +faststart \
            "${OUTPUT_FILENAME}.mp4"

          echo "✅ Final video: ${OUTPUT_FILENAME}.mp4"
          ls -lh "${OUTPUT_FILENAME}.mp4"



      - name: 📤 Upload Podcast Video
        uses: actions/upload-artifact@v4
        with:
          name: Podcast-Video-${{ github.event.inputs.output_filename }}
          path: "${{ github.event.inputs.output_filename }}.mp4"
          retention-days: 7
