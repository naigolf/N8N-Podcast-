name: Generate Podcast Video

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'Direct Download Link of the MP3 file'
        required: true
      video_title:
        description: 'Title of the output video'
        required: true
        default: 'podcast_video'

jobs:
  build-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Audio from Google Drive
        run: wget -O audio.mp3 "${{ github.event.inputs.audio_url }}"

      - name: Combine Image and Audio to Video (9:16)
        # คำสั่งลัด FFmpeg: เอาภาพ cover.jpg (ที่อยู่ใน repo) ผสม audio.mp3 ความยาวเท่าวิดีโอ
        run: |
          ffmpeg -loop 1 -i cover.jpg -i audio.mp3 -c:v libx264 -tune stillimage -c:a aac -b:a 192k -pix_fmt yuv420p -shortest "${{ github.event.inputs.video_title }}.mp4"

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Podcast-Video
          path: "*.mp4"
          retention-days: 1
